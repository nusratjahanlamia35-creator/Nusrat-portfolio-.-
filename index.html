<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nusrat Web Studio | Expert Frontend Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
  :root {
    --bg: #050a14;
    --bg2: #08111f;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --accent: #00c8ff;
    --accent2: #7b5fff;
    --accent3: #ff6b6b;
    --text: #e8edf5;
    --muted: #6b7d96;
    --card-bg: rgba(255,255,255,0.03);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    transition: width .2s, height .2s, background .2s;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1.5px solid rgba(0,200,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%,-50%);
    transition: all .12s ease;
  }
  .cursor.hover { width: 20px; height: 20px; background: var(--accent2); }
  .cursor-ring.hover { width: 52px; height: 52px; border-color: rgba(123,95,255,0.5); }

  /* BACKGROUND GRID */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index:0;
    pointer-events:none;
  }

  /* GLOW ORBS */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.18;
  }
  .orb1 { width:600px;height:600px;background:#00c8ff;top:-200px;left:-200px;animation:drift1 18s ease-in-out infinite alternate; }
  .orb2 { width:500px;height:500px;background:#7b5fff;bottom:-150px;right:-150px;animation:drift2 22s ease-in-out infinite alternate; }
  .orb3 { width:350px;height:350px;background:#ff6b6b;top:40%;left:40%;animation:drift3 15s ease-in-out infinite alternate; }
  @keyframes drift1 { to { transform:translate(80px,60px) scale(1.1); } }
  @keyframes drift2 { to { transform:translate(-60px,-80px) scale(1.08); } }
  @keyframes drift3 { to { transform:translate(-40px,50px) scale(0.9); opacity:0.08; } }

  /* NAV */
  nav {
    position: fixed; top:0; left:0; right:0;
    z-index: 100;
    display: flex; align-items:center; justify-content:space-between;
    padding: 18px 6vw;
    background: rgba(5,10,20,0.6);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    animation: slideDown .8s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes slideDown { from { transform:translateY(-60px);opacity:0; } to { transform:none;opacity:1; } }

  .logo {
    font-family:'Syne',sans-serif;
    font-size:1.3rem;
    font-weight:800;
    letter-spacing:-.5px;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-decoration:none;
  }
  .logo span { color:#fff; -webkit-text-fill-color:#fff; opacity:.3; margin:0 2px; }

  .nav-links { display:flex; gap:36px; list-style:none; }
  .nav-links a {
    color: var(--muted);
    text-decoration:none;
    font-size:.9rem;
    font-weight:500;
    letter-spacing:.3px;
    transition: color .3s;
    position:relative;
  }
  .nav-links a::after {
    content:''; position:absolute; bottom:-4px; left:0; width:0; height:1.5px;
    background: var(--accent); transition: width .3s;
  }
  .nav-links a:hover { color:var(--accent); }
  .nav-links a:hover::after { width:100%; }

  .nav-cta {
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    color:#000!important;
    font-weight:700!important;
    padding:9px 22px;
    border-radius:100px;
    transition: transform .2s, box-shadow .2s!important;
  }
  .nav-cta::after { display:none!important; }
  .nav-cta:hover { transform:scale(1.05)!important; box-shadow:0 0 24px rgba(0,200,255,.35)!important; }

  /* SECTIONS */
  section { position:relative; z-index:1; }

  /* HERO */
  #hero {
    min-height: 100vh;
    display:flex; align-items:center; justify-content:center;
    padding: 140px 6vw 80px;
    text-align:center;
  }
  .hero-inner { max-width:820px; }

  .badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(0,200,255,.08);
    border:1px solid rgba(0,200,255,.2);
    color:var(--accent);
    padding:7px 18px;
    border-radius:100px;
    font-size:.82rem;
    font-weight:600;
    letter-spacing:.8px;
    text-transform:uppercase;
    margin-bottom:28px;
    animation: fadeUp .9s .2s both;
  }
  .badge-dot {
    width:7px;height:7px;background:var(--accent);border-radius:50%;
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  .hero-title {
    font-family:'Syne',sans-serif;
    font-size: clamp(2.8rem,7vw,5.2rem);
    font-weight:800;
    line-height:1.05;
    letter-spacing:-2px;
    margin-bottom:22px;
    animation: fadeUp .9s .35s both;
  }
  .hero-title .accent-line {
    background: linear-gradient(135deg,var(--accent) 0%,var(--accent2) 60%,var(--accent3) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }

  .hero-sub {
    font-size:1.08rem;
    color:var(--muted);
    line-height:1.7;
    max-width:560px;
    margin:0 auto 42px;
    font-weight:300;
    animation: fadeUp .9s .5s both;
  }

  .hero-btns {
    display:flex; gap:16px; justify-content:center; flex-wrap:wrap;
    animation: fadeUp .9s .65s both;
  }
  .btn-primary {
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    color:#000; font-weight:700; font-size:1rem;
    padding:14px 34px; border-radius:100px;
    border:none; cursor:pointer; text-decoration:none;
    transition:transform .2s, box-shadow .3s;
    letter-spacing:.2px;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn-primary:hover { transform:translateY(-3px); box-shadow:0 16px 48px rgba(0,200,255,.3); }

  .btn-ghost {
    color:var(--text); font-weight:600; font-size:1rem;
    padding:13px 34px; border-radius:100px;
    border:1.5px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(10px);
    cursor:pointer; text-decoration:none;
    transition:border-color .3s, background .3s, transform .2s;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn-ghost:hover { border-color:var(--accent2); background:rgba(123,95,255,.1); transform:translateY(-3px); }

  /* STATS */
  .stats-strip {
    display:flex; gap:0; justify-content:center;
    margin-top:70px;
    border-top:1px solid var(--glass-border);
    border-bottom:1px solid var(--glass-border);
    padding:32px 0;
    animation: fadeUp .9s .8s both;
  }
  .stat-item {
    flex:1; max-width:160px;
    text-align:center;
    padding:0 24px;
    border-right:1px solid var(--glass-border);
  }
  .stat-item:last-child { border-right:none; }
  .stat-num {
    font-family:'Syne',sans-serif;
    font-size:2rem; font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .stat-label { font-size:.78rem; color:var(--muted); margin-top:4px; letter-spacing:.5px; text-transform:uppercase; }

  @keyframes fadeUp { from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1} }

  /* ══════════════════════════════
     PROJECTS SECTION — PRO UPGRADE
